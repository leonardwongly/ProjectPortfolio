name: Scan

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Check repository hygiene
        run: npm run check:hygiene

      - name: Check workflow hygiene
        run: npm run check:workflows

      - name: Build generated pages
        run: npm run build

      - name: Ensure generated files are committed
        run: git diff --exit-code -- index.html reading.html offline.html _headers

      - name: Run security and content tests
        run: npm run test:security

      - name: Run PR-safe link preflight
        run: npm run check:links:preflight

      - name: Run high severity dependency audit
        run: npm run audit:high

      - name: Validate vendored dependency governance
        run: npm run validate:vendor:governance
