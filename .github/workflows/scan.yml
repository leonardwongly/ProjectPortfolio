name: Scan

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Build generated pages
        run: npm run build

      - name: Ensure generated files are committed
        run: git diff --exit-code -- index.html reading.html offline.html _headers

      - name: Run security and content tests
        run: npm run test:security
