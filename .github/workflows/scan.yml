name: Scan

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # ratchet:actions/setup-node@v7.0.0
        with:
          node-version: '24'
          cache: npm

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Check repository hygiene
        run: npm run check:hygiene

      - name: Check workflow hygiene
        run: npm run check:workflows

      - name: Build generated pages
        run: npm run build

      - name: Ensure generated files are committed
        run: git diff --exit-code -- index.html reading.html offline.html _headers

      - name: Run security and content tests
        run: npm run test:security

      - name: Run PR-safe link preflight
        run: npm run check:links:preflight

      - name: Run high severity dependency audit
        run: npm run audit:high

      - name: Validate vendored dependency governance
        run: npm run validate:vendor:governance
