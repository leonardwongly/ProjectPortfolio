name: '💬 Gemini CLI'

on:
  issues:
    types:
      - 'opened'
  pull_request_review_comment:
    types:
      - 'created'
  pull_request_review:
    types:
      - 'submitted'
  issue_comment:
    types:
      - 'created'

concurrency:
  group: '${{ github.workflow }}-${{ github.event.issue.number }}'
  cancel-in-progress: |-
    ${{ github.event.sender.type == 'User' && ( github.event.issue.author_association == 'OWNER' || github.event.issue.author_association == 'MEMBER' || github.event.issue.author_association == 'COLLABORATOR') }}

defaults:
  run:
    shell: 'bash'

permissions:
  contents: 'read'

jobs:
  gemini-cli-plan:
    permissions:
      contents: 'read'
      id-token: 'write'
      pull-requests: 'write'
      issues: 'write'
    # Planning handles initial requests, plan modifications, and rejections only.
    # Approved plan execution is isolated in the write-capable job below.
    if: |-
      (
        github.event_name == 'issues' &&
        github.event.action == 'opened' &&
        (
          (
            contains(github.event.issue.body, '@gemini-cli') &&
            !(contains(github.event.issue.body, 'plan#') && contains(github.event.issue.body, 'approved'))
          ) ||
          (
            contains(github.event.issue.body, 'plan#') &&
            !contains(github.event.issue.body, 'approved')
          )
        ) &&
        !contains(github.event.issue.body, '/review') &&
        !contains(github.event.issue.body, '/triage') &&
        (
          github.event.sender.type == 'User' && (
            github.event.issue.author_association == 'OWNER' ||
            github.event.issue.author_association == 'MEMBER' ||
            github.event.issue.author_association == 'COLLABORATOR'
          )
        )
      ) ||
      (
        github.event_name == 'issue_comment' &&
        (
          (
            contains(github.event.comment.body, '@gemini-cli') &&
            !(contains(github.event.comment.body, 'plan#') && contains(github.event.comment.body, 'approved'))
          ) ||
          (
            contains(github.event.comment.body, 'plan#') &&
            !contains(github.event.comment.body, 'approved')
          )
        ) &&
        !contains(github.event.comment.body, '/review') &&
        !contains(github.event.comment.body, '/triage') &&
        (
          github.event.sender.type == 'User' && (
            github.event.comment.author_association == 'OWNER' ||
            github.event.comment.author_association == 'MEMBER' ||
            github.event.comment.author_association == 'COLLABORATOR'
          )
        )
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        (
          (
            contains(github.event.review.body, '@gemini-cli') &&
            !(contains(github.event.review.body, 'plan#') && contains(github.event.review.body, 'approved'))
          ) ||
          (
            contains(github.event.review.body, 'plan#') &&
            !contains(github.event.review.body, 'approved')
          )
        ) &&
        !contains(github.event.review.body, '/review') &&
        !contains(github.event.review.body, '/triage') &&
        (
          github.event.sender.type == 'User' && (
            github.event.review.author_association == 'OWNER' ||
            github.event.review.author_association == 'MEMBER' ||
            github.event.review.author_association == 'COLLABORATOR'
          )
        )
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        (
          (
            contains(github.event.comment.body, '@gemini-cli') &&
            !(contains(github.event.comment.body, 'plan#') && contains(github.event.comment.body, 'approved'))
          ) ||
          (
            contains(github.event.comment.body, 'plan#') &&
            !contains(github.event.comment.body, 'approved')
          )
        ) &&
        !contains(github.event.comment.body, '/review') &&
        !contains(github.event.comment.body, '/triage') &&
        (
          github.event.sender.type == 'User' && (
            github.event.comment.author_association == 'OWNER' ||
            github.event.comment.author_association == 'MEMBER' ||
            github.event.comment.author_association == 'COLLABORATOR'
          )
        )
      )
    timeout-minutes: 10
    runs-on: 'ubuntu-latest'

    steps:
      - name: 'Get planning context from event'
        id: 'get_context'
        env:
          EVENT_NAME: '${{ github.event_name }}'
          EVENT_PAYLOAD: '${{ toJSON(github.event) }}'
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          REPOSITORY: '${{ github.repository }}'
        run: |-
          set -euo pipefail

          USER_REQUEST=""
          ISSUE_NUMBER=""
          IS_PR="false"
          REQUEST_TYPE="initial_request"
          PLAN_ID=""
          PLAN_TEXT=""
          COMMENT_ID=""

          if [[ "${EVENT_NAME}" == "issues" ]]; then
            USER_REQUEST=$(echo "${EVENT_PAYLOAD}" | jq -r .issue.body)
            ISSUE_NUMBER=$(echo "${EVENT_PAYLOAD}" | jq -r .issue.number)
          elif [[ "${EVENT_NAME}" == "issue_comment" ]]; then
            USER_REQUEST=$(echo "${EVENT_PAYLOAD}" | jq -r .comment.body)
            ISSUE_NUMBER=$(echo "${EVENT_PAYLOAD}" | jq -r .issue.number)
            if [[ $(echo "${EVENT_PAYLOAD}" | jq -r .issue.pull_request) != "null" ]]; then
              IS_PR="true"
            fi
          elif [[ "${EVENT_NAME}" == "pull_request_review" ]]; then
            USER_REQUEST=$(echo "${EVENT_PAYLOAD}" | jq -r .review.body)
            ISSUE_NUMBER=$(echo "${EVENT_PAYLOAD}" | jq -r .pull_request.number)
            IS_PR="true"
          elif [[ "${EVENT_NAME}" == "pull_request_review_comment" ]]; then
            USER_REQUEST=$(echo "${EVENT_PAYLOAD}" | jq -r .comment.body)
            ISSUE_NUMBER=$(echo "${EVENT_PAYLOAD}" | jq -r .pull_request.number)
            IS_PR="true"
          fi

          if [[ ${USER_REQUEST} == *"plan#"* ]]; then
            PLAN_ID=$(echo "${USER_REQUEST}" | grep -Eo 'plan#[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}' | head -n 1 | sed 's/plan#//' || true)
            if [[ -z "${PLAN_ID}" ]]; then
              echo "Invalid or missing plan id. Expected plan#<uuid>." >&2
              exit 1
            fi

            if [[ ${USER_REQUEST} == *"rejected"* ]]; then
              REQUEST_TYPE="plan_rejection"
            else
              REQUEST_TYPE="plan_modification"
              PLAN_COMMENT_DATA=$(gh issue view "${ISSUE_NUMBER}" --repo "${REPOSITORY}" --json comments --jq "[.comments[] | select(.body | contains(\"plan#${PLAN_ID}\")) | select(.author.login == \"github-actions[bot]\")] | .[0]")
              if [[ -z "${PLAN_COMMENT_DATA}" || "${PLAN_COMMENT_DATA}" == "null" ]]; then
                echo "No bot-authored pending plan found for plan#${PLAN_ID}." >&2
                exit 1
              fi
              PLAN_TEXT=$(echo "${PLAN_COMMENT_DATA}" | jq -r .body)
              COMMENT_ID=$(echo "${PLAN_COMMENT_DATA}" | jq -r .id)
            fi
          fi

          if [[ ${USER_REQUEST} == *"@gemini-cli"* ]]; then
            USER_REQUEST=$(echo "${USER_REQUEST}" | sed 's/.*@gemini-cli//' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          fi

          if [[ "${IS_PR}" == "true" ]]; then
            COMMENT_COMMAND="gh pr comment \"${ISSUE_NUMBER}\" --body-file response.md"
          else
            COMMENT_COMMAND="gh issue comment \"${ISSUE_NUMBER}\" --body-file response.md"
          fi

          COMMENT_PROGRESS_COMMAND=""
          if [[ -n "${COMMENT_ID}" ]]; then
            if [[ "${IS_PR}" == "true" ]]; then
              COMMENT_PROGRESS_COMMAND="gh pr comment --edit \"${COMMENT_ID}\" --body-file response.md"
            else
              COMMENT_PROGRESS_COMMAND="gh issue comment --edit \"${COMMENT_ID}\" --body-file response.md"
            fi
          fi

          write_multiline_output() {
            local name="$1"
            local value="$2"
            local delimiter
            while true; do
              delimiter="GITHUB_OUTPUT_$(uuidgen | tr '[:lower:]' '[:upper:]' | tr -d '-')"
              if ! grep -Fqx "${delimiter}" <<< "${value}"; then
                break
              fi
            done
            {
              echo "${name}<<${delimiter}"
              printf '%s\n' "${value}"
              echo "${delimiter}"
            } >> "${GITHUB_OUTPUT}"
          }

          write_multiline_output "user_request" "${USER_REQUEST}"
          write_multiline_output "plan_text" "${PLAN_TEXT}"

          {
            echo "issue_number=${ISSUE_NUMBER}"
            echo "is_pr=${IS_PR}"
            echo "request_type=${REQUEST_TYPE}"
            echo "plan_id=${PLAN_ID}"
            echo "comment_id=${COMMENT_ID}"
            echo "comment_command=${COMMENT_COMMAND}"
            echo "comment_progress_command=${COMMENT_PROGRESS_COMMAND}"
          } >> "${GITHUB_OUTPUT}"

      - name: 'Checkout PR branch'
        if: |-
          ${{ steps.get_context.outputs.is_pr == 'true' }}
        uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0' # ratchet:actions/checkout@v7.0.0
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          repository: '${{ github.repository }}'
          ref: 'refs/pull/${{ steps.get_context.outputs.issue_number }}/head'
          fetch-depth: 0
          persist-credentials: false

      - name: 'Checkout main branch'
        if: |-
          ${{ steps.get_context.outputs.is_pr == 'false' }}
        uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0' # ratchet:actions/checkout@v7.0.0
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          repository: '${{ github.repository }}'
          fetch-depth: 0
          persist-credentials: false

      - name: 'Acknowledge planning request'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          ISSUE_NUMBER: '${{ steps.get_context.outputs.issue_number }}'
          REPOSITORY: '${{ github.repository }}'
          REQUEST_TYPE: '${{ steps.get_context.outputs.request_type }}'
        run: |-
          set -euo pipefail
          MESSAGE=""
          case "${REQUEST_TYPE}" in
            'initial_request')
              MESSAGE="I've received your request and I'm working on it now! 🤖"
              ;;
            'plan_modification')
              MESSAGE="I've received your modification request and I'm working on a new plan! 📝"
              ;;
            'plan_rejection')
              MESSAGE="I've received your rejection and will respond shortly. 🤔"
              ;;
          esac
          if [[ -n "${MESSAGE}" ]]; then
            gh issue comment "${ISSUE_NUMBER}" \
              --body "${MESSAGE}" \
              --repo "${REPOSITORY}"
          fi

      - name: 'Run Gemini planning'
        id: 'run_gemini'
        uses: 'google-github-actions/run-gemini-cli@f77273f4c914e4bf38440cf36a0369cb64a37489' # ratchet:google-github-actions/run-gemini-cli@v0.1.22
        env:
          REPOSITORY: '${{ github.repository }}'
          USER_REQUEST: '${{ steps.get_context.outputs.user_request }}'
          ISSUE_NUMBER: '${{ steps.get_context.outputs.issue_number }}'
          IS_PR: '${{ steps.get_context.outputs.is_pr }}'
          REQUEST_TYPE: '${{ steps.get_context.outputs.request_type }}'
          PLAN_ID: '${{ steps.get_context.outputs.plan_id }}'
          PLAN_TEXT: '${{ steps.get_context.outputs.plan_text }}'
          COMMENT_ID: '${{ steps.get_context.outputs.comment_id }}'
          COMMENT_COMMAND: '${{ steps.get_context.outputs.comment_command }}'
          COMMENT_PROGRESS_COMMAND: '${{ steps.get_context.outputs.comment_progress_command }}'
          OTLP_GOOGLE_CLOUD_PROJECT: '${{ vars.OTLP_GOOGLE_CLOUD_PROJECT }}'
          SERVICE_ACCOUNT_EMAIL: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}'
          use_gemini_code_assist: '${{ vars.GOOGLE_GENAI_USE_GCA }}'
          settings: |-
            {
              "maxSessionTurns": 50,
              "coreTools": ["write_file"],
              "telemetry": {
                "enabled": false,
                "target": "gcp"
              }
            }
          prompt: |-
            ## Role & Goal

            You are an AI assistant in a GitHub workflow. Your goal is to understand a user's request, and either answer it directly or create a plan to fulfill it. You will interact with the user by posting comments to the GitHub issue or pull request.

            ## Context

            - **Repository**: '${{ github.repository }}'
            - **Triggering Event**: '${{ github.event_name }}'
            - **Issue/PR Number**: '${{ env.ISSUE_NUMBER }}'
            - **Is this a PR?**: '${{ env.IS_PR }}'
            - **User Request**: '${{ env.USER_REQUEST }}'
            - **Request Type**: '${{ env.REQUEST_TYPE }}'
            - **Plan Text**: '${{ env.PLAN_TEXT }}'
            - **Comment Command**: '${{ env.COMMENT_COMMAND }}'
            - **Comment Progress Command**: '${{ env.COMMENT_PROGRESS_COMMAND }}'

            ## Instructions by Request Type

            Your action depends on the `REQUEST_TYPE`.

            ### 1. `initial_request`

            - **Analyze the user's request.**
            - **If the request is a question or asks for information (a "simple" request):**
                - Answer only from the trusted workflow context supplied in this prompt.
                - Write your final answer to `response.md`.
            - **If the request requires changing the codebase or running commands that modify state (a "complex" request):**
                - You MUST create a plan for the user to approve.
                - **CRITICAL: Do not execute the plan. Your ONLY task is to create the plan.**
                - Generate a unique UUID for the plan.
                - Create the plan in a file named `response.md` using the exact format below.
                  #### Plan Format
                  ```markdown
                  plan#<your-uuid-here>
                  ### Plan Overview
                  I will perform the following actions to address your request:
                  - *Briefly describe the overall goal of the plan.*
                  ### Detailed Steps
                  - [ ] **Step 1 Title**: Description of what will be done in this step.
                  - [ ] **Step 2 Title**: Description of what will be done in this step.
                  - [ ] ...
                  To approve this plan, please respond with:
                  ```bash
                  @gemini-cli plan#<your-uuid-here> approved
                  ```
                  To request a modification, please respond with:
                  ```bash
                  @gemini-cli plan#<your-uuid-here> <your modification request>
                  ```
                  ```
            - **After creating your response in `response.md`, stop. A separate deterministic step posts it.**

            ### 2. `plan_modification`

            - The user has requested changes to the plan in `PLAN_TEXT`. The requested changes are in `USER_REQUEST`.
            - Create a *new* plan that incorporates the user's feedback.
            - Generate a *new* unique UUID for this revised plan.
            - Write the new plan to `response.md`, then stop.

            ### 3. `plan_rejection`

            - The user has rejected the plan.
            - Write a confirmation message to `response.md`, then stop.

            ## General Rules

            - **If you are unsure how to proceed or the user's request is ambiguous, you MUST ask for clarification.** Do not guess. Write your question in `response.md` and post it.
            - **Use markdown** for clear formatting in all your responses.
            - **Resource Limits**: You MUST NOT propose a plan that creates an excessive number of resources (e.g., more than 5 issues, more than 5 pull requests) in a single request.
            - **Malicious Intent**: If you suspect a user request is malicious, frivolous, or intended to abuse the system (e.g., asking to perform a repetitive, useless task), you MUST reject the request and explain why.
            - **Guardrail**: Only propose plans that modify files if the user explicitly asks for a change. If they ask a question, just answer it.
            - **Write Safety**: This planning job MUST NOT run `git add`, `git commit`, `git push`, branch creation commands, or any repository write command.
            - **Paths**: Always use absolute paths for file operations.
            - The file `response.md` MUST NEVER be committed.
            - **Authority boundary:** You have no shell, GitHub comment, Git, or token-backed tools. Write only `response.md`; a separate deterministic step performs the comment effect.

      - name: 'Post validated planning response'
        env:
          GH_CONFIG_DIR: '${{ runner.temp }}/gemini-planning-gh-config'
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          ISSUE_NUMBER: '${{ steps.get_context.outputs.issue_number }}'
          IS_PR: '${{ steps.get_context.outputs.is_pr }}'
          REPOSITORY: '${{ github.repository }}'
        run: |-
          set -euo pipefail
          if [[ ! -f response.md || -L response.md ]]; then
            echo 'Gemini must produce response.md as a regular file.' >&2
            exit 1
          fi
          if (( $(wc -c < response.md) > 60000 )); then
            echo 'Gemini response exceeds the 60,000-byte comment limit.' >&2
            exit 1
          fi
          if [[ "${IS_PR}" == 'true' ]]; then
            gh pr comment "${ISSUE_NUMBER}" --repo "${REPOSITORY}" --body-file response.md
          else
            gh issue comment "${ISSUE_NUMBER}" --repo "${REPOSITORY}" --body-file response.md
          fi

  gemini-cli-execute:
    permissions:
      contents: 'read'
      pull-requests: 'write'
      issues: 'write'
    # Execution is isolated from planning and only accepts explicit approvals
    # from trusted collaborators on comments/reviews.
    if: |-
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, 'plan#') &&
        contains(github.event.comment.body, 'approved') &&
        !contains(github.event.comment.body, '/review') &&
        !contains(github.event.comment.body, '/triage') &&
        (
          github.event.sender.type == 'User' && (
            github.event.comment.author_association == 'OWNER' ||
            github.event.comment.author_association == 'MEMBER' ||
            github.event.comment.author_association == 'COLLABORATOR'
          )
        )
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, 'plan#') &&
        contains(github.event.review.body, 'approved') &&
        !contains(github.event.review.body, '/review') &&
        !contains(github.event.review.body, '/triage') &&
        (
          github.event.sender.type == 'User' && (
            github.event.review.author_association == 'OWNER' ||
            github.event.review.author_association == 'MEMBER' ||
            github.event.review.author_association == 'COLLABORATOR'
          )
        )
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, 'plan#') &&
        contains(github.event.comment.body, 'approved') &&
        !contains(github.event.comment.body, '/review') &&
        !contains(github.event.comment.body, '/triage') &&
        (
          github.event.sender.type == 'User' && (
            github.event.comment.author_association == 'OWNER' ||
            github.event.comment.author_association == 'MEMBER' ||
            github.event.comment.author_association == 'COLLABORATOR'
          )
        )
      )
    timeout-minutes: 10
    runs-on: 'ubuntu-latest'

    steps:
      - name: 'Get execution context from event'
        id: 'get_context'
        env:
          EVENT_NAME: '${{ github.event_name }}'
          EVENT_PAYLOAD: '${{ toJSON(github.event) }}'
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          REPOSITORY: '${{ github.repository }}'
        run: |-
          set -euo pipefail

          USER_REQUEST=""
          ISSUE_NUMBER=""
          IS_PR="false"
          PLAN_ID=""
          PLAN_TEXT=""
          COMMENT_ID=""

          if [[ "${EVENT_NAME}" == "issue_comment" ]]; then
            USER_REQUEST=$(echo "${EVENT_PAYLOAD}" | jq -r .comment.body)
            ISSUE_NUMBER=$(echo "${EVENT_PAYLOAD}" | jq -r .issue.number)
            if [[ $(echo "${EVENT_PAYLOAD}" | jq -r .issue.pull_request) != "null" ]]; then
              IS_PR="true"
            fi
          elif [[ "${EVENT_NAME}" == "pull_request_review" ]]; then
            USER_REQUEST=$(echo "${EVENT_PAYLOAD}" | jq -r .review.body)
            ISSUE_NUMBER=$(echo "${EVENT_PAYLOAD}" | jq -r .pull_request.number)
            IS_PR="true"
          elif [[ "${EVENT_NAME}" == "pull_request_review_comment" ]]; then
            USER_REQUEST=$(echo "${EVENT_PAYLOAD}" | jq -r .comment.body)
            ISSUE_NUMBER=$(echo "${EVENT_PAYLOAD}" | jq -r .pull_request.number)
            IS_PR="true"
          fi

          PLAN_ID=$(echo "${USER_REQUEST}" | grep -Eo 'plan#[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}' | head -n 1 | sed 's/plan#//' || true)
          if [[ -z "${PLAN_ID}" ]]; then
            echo "Invalid or missing plan id. Expected plan#<uuid>." >&2
            exit 1
          fi

          if ! echo "${USER_REQUEST}" | grep -Eq "(^|[[:space:]])(@gemini-cli[[:space:]]+)?plan#${PLAN_ID}[[:space:]]+approved([[:space:]]|$)"; then
            echo "Plan execution requires the exact approval command: @gemini-cli plan#${PLAN_ID} approved" >&2
            exit 1
          fi

          PLAN_COMMENT_DATA=$(gh issue view "${ISSUE_NUMBER}" --repo "${REPOSITORY}" --json comments --jq "[.comments[] | select(.body | contains(\"plan#${PLAN_ID}\")) | select(.author.login == \"github-actions[bot]\")] | .[0]")
          if [[ -z "${PLAN_COMMENT_DATA}" || "${PLAN_COMMENT_DATA}" == "null" ]]; then
            echo "No bot-authored pending plan found for plan#${PLAN_ID}." >&2
            exit 1
          fi
          PLAN_TEXT=$(echo "${PLAN_COMMENT_DATA}" | jq -r .body)
          COMMENT_ID=$(echo "${PLAN_COMMENT_DATA}" | jq -r .id)

          if [[ "${IS_PR}" == "true" ]]; then
            COMMENT_COMMAND="gh pr comment \"${ISSUE_NUMBER}\" --body-file response.md"
            COMMENT_PROGRESS_COMMAND="gh pr comment --edit \"${COMMENT_ID}\" --body-file response.md"
          else
            COMMENT_COMMAND="gh issue comment \"${ISSUE_NUMBER}\" --body-file response.md"
            COMMENT_PROGRESS_COMMAND="gh issue comment --edit \"${COMMENT_ID}\" --body-file response.md"
          fi

          write_multiline_output() {
            local name="$1"
            local value="$2"
            local delimiter
            while true; do
              delimiter="GITHUB_OUTPUT_$(uuidgen | tr '[:lower:]' '[:upper:]' | tr -d '-')"
              if ! grep -Fqx "${delimiter}" <<< "${value}"; then
                break
              fi
            done
            {
              echo "${name}<<${delimiter}"
              printf '%s\n' "${value}"
              echo "${delimiter}"
            } >> "${GITHUB_OUTPUT}"
          }

          write_multiline_output "user_request" "${USER_REQUEST}"
          write_multiline_output "plan_text" "${PLAN_TEXT}"

          {
            echo "issue_number=${ISSUE_NUMBER}"
            echo "is_pr=${IS_PR}"
            echo "request_type=plan_execution"
            echo "plan_id=${PLAN_ID}"
            echo "comment_id=${COMMENT_ID}"
            echo "comment_command=${COMMENT_COMMAND}"
            echo "comment_progress_command=${COMMENT_PROGRESS_COMMAND}"
          } >> "${GITHUB_OUTPUT}"

      - name: 'Checkout PR branch'
        if: |-
          ${{ steps.get_context.outputs.is_pr == 'true' }}
        uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0' # ratchet:actions/checkout@v7.0.0
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          repository: '${{ github.repository }}'
          ref: 'refs/pull/${{ steps.get_context.outputs.issue_number }}/head'
          fetch-depth: 0
          persist-credentials: false

      - name: 'Checkout main branch'
        if: |-
          ${{ steps.get_context.outputs.is_pr == 'false' }}
        uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0' # ratchet:actions/checkout@v7.0.0
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          repository: '${{ github.repository }}'
          fetch-depth: 0
          persist-credentials: false

      - name: 'Run Gemini execution'
        id: 'run_gemini'
        uses: 'google-github-actions/run-gemini-cli@f77273f4c914e4bf38440cf36a0369cb64a37489' # ratchet:google-github-actions/run-gemini-cli@v0.1.22
        env:
          REPOSITORY: '${{ github.repository }}'
          USER_REQUEST: '${{ steps.get_context.outputs.user_request }}'
          ISSUE_NUMBER: '${{ steps.get_context.outputs.issue_number }}'
          IS_PR: '${{ steps.get_context.outputs.is_pr }}'
          REQUEST_TYPE: '${{ steps.get_context.outputs.request_type }}'
          PLAN_ID: '${{ steps.get_context.outputs.plan_id }}'
          PLAN_TEXT: '${{ steps.get_context.outputs.plan_text }}'
          COMMENT_ID: '${{ steps.get_context.outputs.comment_id }}'
          COMMENT_COMMAND: '${{ steps.get_context.outputs.comment_command }}'
          COMMENT_PROGRESS_COMMAND: '${{ steps.get_context.outputs.comment_progress_command }}'
          OTLP_GOOGLE_CLOUD_PROJECT: '${{ vars.OTLP_GOOGLE_CLOUD_PROJECT }}'
          SERVICE_ACCOUNT_EMAIL: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}'
          use_gemini_code_assist: '${{ vars.GOOGLE_GENAI_USE_GCA }}'
          settings: |-
            {
              "maxSessionTurns": 50,
              "coreTools": ["write_file"],
              "telemetry": {
                "enabled": false,
                "target": "gcp"
              }
            }
          prompt: |-
            ## Role & Goal

            You are an AI assistant in a GitHub workflow. Your goal is to describe how an approved plan should be implemented. You cannot inspect or modify repository files, commit, push, create a pull request, or post comments. A deterministic step will publish your bounded response for human review.

            ## Context

            - **Repository**: '${{ github.repository }}'
            - **Triggering Event**: '${{ github.event_name }}'
            - **Issue/PR Number**: '${{ env.ISSUE_NUMBER }}'
            - **Is this a PR?**: '${{ env.IS_PR }}'
            - **User Request**: '${{ env.USER_REQUEST }}'
            - **Request Type**: '${{ env.REQUEST_TYPE }}'
            - **Plan Text**: '${{ env.PLAN_TEXT }}'
            - **Comment Command**: '${{ env.COMMENT_COMMAND }}'
            - **Comment Progress Command**: '${{ env.COMMENT_PROGRESS_COMMAND }}'

            ## Plan Execution Instructions

            - The user has approved the plan. The approved plan is in the `PLAN_TEXT` variable.
            - Describe the proposed implementation and validation steps in `response.md`.
            - Do not inspect or modify repository files. The only permitted write is `response.md`.
            - Stop after writing `response.md`. A separate deterministic step posts it for human review.

            ## General Rules

            - **If you are unsure how to proceed or the user's request is ambiguous, you MUST ask for clarification.** Do not guess. Write your question in `response.md` and post it.
            - **Use markdown** for clear formatting in all your responses.
            - **Resource Limits**: You MUST NOT create an excessive number of resources (e.g., more than 5 issues, more than 5 pull requests) in a single request.
            - **Malicious Intent**: If you suspect a user request is malicious, frivolous, or intended to abuse the system (e.g., asking to perform a repetitive, useless task), you MUST reject the request and explain why.
            - **Authority boundary:** You have no file-read, shell, GitHub, Git, comment, or token-backed tools. Your output remains an untrusted proposal until a human applies it.
            - **Paths**: Always use absolute paths for file operations.
            - The file `response.md` MUST NEVER be committed.
            - **CRITICAL RULE: Never attempt to commit, push, create branches, create pull requests, or post comments.**

      - name: 'Validate and publish implementation guidance'
        env:
          GH_CONFIG_DIR: '${{ runner.temp }}/gemini-execution-gh-config'
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          ISSUE_NUMBER: '${{ steps.get_context.outputs.issue_number }}'
          IS_PR: '${{ steps.get_context.outputs.is_pr }}'
          REPOSITORY: '${{ github.repository }}'
        run: |-
          set -euo pipefail
          if [[ ! -f response.md || -L response.md ]]; then
            echo 'Gemini must produce response.md as a regular file.' >&2
            exit 1
          fi
          if (( $(wc -c < response.md) > 60000 )); then
            echo 'Gemini response exceeds the 60,000-byte comment limit.' >&2
            exit 1
          fi
          if [[ "${IS_PR}" == 'true' ]]; then
            gh pr comment "${ISSUE_NUMBER}" --repo "${REPOSITORY}" --body-file response.md
          else
            gh issue comment "${ISSUE_NUMBER}" --repo "${REPOSITORY}" --body-file response.md
          fi
