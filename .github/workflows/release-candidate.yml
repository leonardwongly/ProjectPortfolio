name: Release Candidate

on:
  workflow_dispatch:
  pull_request:
    types: [ready_for_review]

permissions:
  contents: read

jobs:
  release-candidate:
    name: Full Validation
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: release-candidate-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # ratchet:actions/setup-node@v7.0.0
        with:
          node-version: '24'
          cache: npm

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Install Chromium for Playwright
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: Run full validation
        run: npm run validate:full
