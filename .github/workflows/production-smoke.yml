name: Production Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '42 4 * * 1'

permissions:
  contents: read

jobs:
  production-smoke:
    name: Production Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js 20
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # ratchet:actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Check production pages and headers
        run: npm run check:production
        env:
          SMOKE_ATTEMPTS: '6'
          SMOKE_RETRY_DELAY_MS: '10000'
          SMOKE_TIMEOUT_MS: '10000'
