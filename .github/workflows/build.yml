name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # ratchet:actions/setup-node@v7.0.0
        with:
          node-version: '20'
      - name: Install Node dependencies
        run: npm ci --ignore-scripts
      - name: Build generated pages
        run: npm run build
      - name: Ensure generated files are committed
        run: git diff --exit-code -- index.html reading.html offline.html _headers
      - name: Run security and content tests
        run: npm run test:security
